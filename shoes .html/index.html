<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoes Website</title>

<style>
:root{
    --btn-clr: linear-gradient(45deg,#df2626,#ffec62,#4cf41c);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
    text-decoration:none;
    list-style:none;
}
.hero{
    min-height:100vh;
    background:url("https://images.unsplash.com/photo-1542291026-7eec264c27ff");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    overflow:hidden;
}
nav{
    display:flex;
    align-items:center;
    justify-content:space-around;
    padding:10px 0;
    width:98%;
    margin:auto;
    border-bottom:2px solid #fff;
}

.logo{
    width:180px;
}

nav ul{
    display:flex;
    align-items:center;
}

nav ul li{
    margin:0 20px;
}

nav ul li a{
    font-size:15px;
    color:#fff;
    text-transform:uppercase;
}

nav ul li a:hover{
    border-bottom:2px solid #fff;
}

nav button{
    padding:12px 35px;
    background:var(--btn-clr);
    border:none;
    color:#fff;
    font-size:15px;
    font-weight:600;
    border-radius:2rem;
    cursor:pointer;
    transition:.3s;
}

nav button:hover{
    transform:scale(.9);
}

.content{
    position:absolute;
    top:35%;
    left:10%;
}

h2{
    font-size:52px;
    color:#fff;
    font-weight:800;
    text-transform:uppercase;
}

h2 span{
    background:var(--btn-clr);
    -webkit-text-fill-color:transparent;
    -webkit-background-clip:text;
}

p{
    font-size:14px;
    color:#fff;
    margin-top:10px;
}

.content button{
    margin-top:40px;
    padding:12px 45px;
    background:var(--btn-clr);
    border:none;
    border-radius:2rem;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.content button:hover{
    transform:scale(.9);
}

.content button.Explore_More{
    margin-left:25px;
    border:2px solid #fff;
    background:transparent;
}

.content button.Explore_More:hover{
    border-color:rgb(7,229,250);
    color:rgb(7,229,250);
    box-shadow:0 0 20px rgb(7,229,250);
}
</style>
</head>

<body>

<div class="hero">

<nav>
<img src="https://images.pexels.com/photos/18946898/pexels-photo-18946898/free-photo-of-shoes-on-red-background.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr" class="logo">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Products</a></li>
<li><a href="#">Stores</a></li>
<li><a href="#">Reviews</a></li>
</ul>
</nav>

<div class="content">
<h2>Experience the perfect blend of <span>fashion</span> <br>and comfort with every stride</h2>

<p>
Step into a world where style meets comfort, enhancing every stride with quality
craftsmanship and timeless design, <br>because your feet deserve the best.
</p>

<button>Shop Now</button>
<button class="Explore_More">Explore More</button>
</div>

</div>

</body>
</html>
