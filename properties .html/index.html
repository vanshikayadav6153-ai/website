

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>properties by pranjal maurya </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
text-decoration:none;
list-style:none;
}

.hero{
min-height:100vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c");
background-size:cover;
background-position:center;
position:relative;
}

nav{
display:flex;
align-items:center;
justify-content:space-between;
width:90%;
margin:auto;
padding:20px 0;
border-bottom:1px solid white;
}

.logo{
width:130px;
border-radius:10px;
}

nav ul{
display:flex;
align-items:center;
}

nav ul li{
margin:0 15px;
}

nav ul li a{
color:white;
font-size:15px;
text-transform:uppercase;
transition:.3s;
}

nav ul li a:hover{
color:red;
border-bottom:2px solid red;
}

nav button{
padding:10px 30px;
background:transparent;
border:2px solid white;
color:white;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

nav button:hover{
background:red;
border:none;
}

.content{
position:absolute;
top:40%;
left:8%;
max-width:600px;
}

.content h2{
color:white;
font-size:50px;
font-weight:800;
line-height:1.3;
}

.content h2 span{
color:red;
}

.content p{
color:white;
margin-top:10px;
font-size:14px;
}

.buttons{
margin-top:40px;
}

.buttons button{
padding:12px 35px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
margin-right:15px;
transition:.3s;
}

.buy{
background:white;
}

.buy:hover{
transform:scale(1.1);
}

.know{
background:transparent;
border:2px solid white;
color:white;
}

.know:hover{
background:red;
border:none;
}

@media(max-width:768px){

nav ul{
display:none;
}

.content{
left:5%;
top:35%;
}

.content h2{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="hero">

<nav>

<img src="https://graphicsfamily.com/wp-content/uploads/edd/2022/11/Luxury-Real-Estate-Logo-Design-scaled.jpg" class="logo" alt="logo">

<ul>
<li><a href="#">Open Kitchen</a></li>
<li><a href="#">3 Bedrooms</a></li>
<li><a href="#">Top Security</a></li>
<li><a href="#">Prime Location</a></li>
<li><a href="#">Swimming Pool</a></li>
</ul>

<button>More</button>

</nav>

<div class="content">

<h2>"Find a perfect home for your family"
    <span>  best and low price</span></h2>

<p> Discover luxury homes with modern design, security and best location for your family comfort.</p>

<div class="buttons">
<button class="buy-now"> buy now</button>
<button class="know-more"> know more</button>
</div>

</div>

</div>

</body>
</html>
